<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Korea Triplive</title>
<style>
  :root { --blue:#2C8FE8; --orange:#FF6B45; --ink:#16202A; --muted:#5F6B78; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:#fff; }
  .hero { background:var(--blue); color:#fff; text-align:center; padding:56px 20px 48px; }
  .pin { width:64px; height:64px; margin:0 auto 16px; display:block; }
  .hero h1 { margin:0; font-size:28px; font-weight:700; }
  .hero p { margin:10px auto 0; max-width:520px; font-size:16px; opacity:.92; line-height:1.6; }
  main { max-width:640px; margin:0 auto; padding:36px 20px 60px; }
  .links { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .links a { flex:1; min-width:160px; text-align:center; text-decoration:none; color:var(--ink); border:1px solid #e6e9ee; border-radius:12px; padding:18px; font-size:16px; font-weight:600; }
  .links a:hover { border-color:var(--blue); }
  .muted { color:var(--muted); font-size:13px; text-align:center; margin-top:40px; }
</style>
</head>
<body>
<div class="hero">
  <svg class="pin" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M32 6 C20 6 11 15 11 27 C11 43 32 58 32 58 C32 58 53 43 53 27 C53 15 44 6 32 6 Z" fill="#fff"/>
    <circle cx="32" cy="26" r="9" fill="#FF6B45"/>
  </svg>
  <h1>Korea Triplive</h1>
  <p>The on-the-ground companion for travelers in Korea — turn your bookings into things you can actually use.</p>
</div>
<main>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="support.html">Support</a>
  </div>
  <p class="muted">© 2026 Korea Triplive · Contact: roundhouse04@gmail.com</p>
</main>
</body>
</html>
